<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS v0.3</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f5f5;
 color:#222;
}

/* モーダル */
#modal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.6);
 display:flex;justify-content:center;align-items:center;
 z-index:999;
}
.modalBox{
 background:#fff;padding:20px;border-radius:8px;
}

/* タイトル */
header{padding:10px;font-size:18px}

/* タブ */
.tabs{
 display:flex;
 border-bottom:1px solid #ccc;
}
.tab{
 padding:8px 16px;
 cursor:pointer;
}
.tab.active{
 border-bottom:3px solid #007bff;
 font-weight:bold;
}

/* カメラ上スペース */
.topSpace{height:10px}

/* カメラ */
#cameraArea{
 width:90vw;height:90vw;margin:auto;
 background:#ddd;
 position:relative;
}
video{width:100%;height:100%;object-fit:cover}

/* No Signal */
#nosignal{
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
 color:#555;
}

/* レティクル */
#reticle{
 position:absolute;top:50%;left:50%;
 width:60px;height:60px;
 transform:translate(-50%,-50%);
 display:none;
}
#reticle::before,#reticle::after{
 content:"";position:absolute;background:#00aa00;
}
#reticle::before{width:100%;height:2px;top:50%}
#reticle::after{height:100%;width:2px;left:50%}

/* HUD */
#hud{
 position:absolute;right:10px;bottom:10px;
 font-size:14px;
}

/* ボタン */
.controls{
 display:flex;gap:10px;padding:10px;
}
button{
 flex:1;
 padding:10px;
 border-radius:6px;
 border:1px solid #ccc;
 background:#eee;
 cursor:pointer;
}
#mainBtn{
 flex:2;
 font-size:16px;
}

/* 計算表示 */
#formula{
 padding:12px;
 font-size:18px;
 background:#fff;
 margin:10px;
 border-radius:6px;
 text-align:center;
}

/* オプション */
#optionTab{display:none;padding:10px}

.inline{margin-top:10px}

.optBtn{
 margin-top:10px;
 padding:10px;
 background:#eee;
 border-radius:6px;
 text-align:center;
 cursor:pointer;
}
</style>
</head>

<body>

<div id="modal">
 <div class="modalBox">
  <h3>READMEの確認</h3>
  <p>READMEをご確認ください。</p>
  <button onclick="start()">OK</button>
  <button onclick="location.href='https://www.mod.go.jp/atla/'">キャンセル</button>
 </div>
</div>

<header>ARIS</header>

<div class="tabs">
 <div id="tabMain" class="tab active" onclick="tab('main')">メイン</div>
 <div id="tabOpt" class="tab" onclick="tab('opt')">オプション</div>
</div>

<div class="topSpace"></div>

<!-- メイン -->
<div id="mainTab">

<div id="cameraArea">
 <video id="video" autoplay playsinline></video>
 <div id="nosignal">No Signal</div>
 <div id="reticle"></div>
 <div id="hud">
  BL:<span id="hBL">--</span><br>
  Alt:<span id="hAlt">--</span><br>
  Dev:<span id="hRal">--</span>
 </div>
</div>

<div class="controls">
 <button id="camBtn">カメラ</button>
 <button id="sensorBtn">センサ</button>
 <button id="mainBtn">センサを許可してください</button>
</div>

<div id="formula">NaN</div>

</div>

<!-- オプション -->
<div id="optionTab">

<div class="inline">AL = <input id="al" value="10"></div>
<div class="inline">AE = <input id="ae" value="1.0"></div>

<div class="inline">
 Roll:(<span id="fRoll"></span>)
 Yaw:(<span id="fYaw"></span>)
 Pitch:(<span id="fPitch"></span>)
</div>

<div class="inline">
 CR:(<span id="cRoll"></span>)
 CY:(<span id="cYaw"></span>)
 CP:(<span id="cPitch"></span>)
</div>

<div class="optBtn" id="csvBtn">CSVデータダウンロード</div>
<div class="optBtn" id="calBtn">キャリブレーション</div>
<div class="optBtn" onclick="window.open('https://www.mod.go.jp/atla/')">フィードバック</div>

</div>

<script>
let camOK=false,sensorOK=false;
let Roll=0,Yaw=0,Pitch=0;
let CRoll=0,CYaw=0,CPitch=0;

let lastT = NaN;

let csv="date,time,Roll,Yaw,Pitch,CRoll,CYaw,CPitch,FPitch,BL,TAlti\n";

function start(){modal.style.display="none"}

function tab(t){
 mainTab.style.display=(t==="main")?"block":"none";
 optionTab.style.display=(t==="opt")?"block":"none";
 tabMain.classList.toggle("active",t==="main");
 tabOpt.classList.toggle("active",t==="opt");
}

/* カメラ */
camBtn.onclick=async()=>{
 const s=await navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
 });
 video.srcObject=s;
 nosignal.style.display="none";
 reticle.style.display="block";
 camOK=true;
};

/* センサ */
sensorBtn.onclick=async()=>{
 if(DeviceOrientationEvent.requestPermission){
  const r=await DeviceOrientationEvent.requestPermission();
  if(r!=="granted")return;
 }
 window.addEventListener("deviceorientation",e=>{
  Roll=e.gamma||0;
  Pitch=(e.beta||0)-90;
  Yaw=e.alpha||0;
 });
 sensorOK=true;
};

/* 更新 */
function loop(){
 const BL=Number(bl?.value)||0;
 const AE=Number(ae.value)||0;

 const FRoll=Roll+CRoll;
 const FYaw=Yaw+CYaw;
 const FPitch=Pitch+CPitch;

 const tanVal=Math.tan(FPitch*Math.PI/180);
 const RAL=(100*Math.tan((FPitch+AE)*Math.PI/180))-100;

 hBL.textContent=BL;
 hAlt.textContent=isNaN(lastT)?"--":lastT.toFixed(2);
 hRal.textContent=RAL.toFixed(1);

 fRoll.textContent=FRoll.toFixed(1);
 fYaw.textContent=FYaw.toFixed(1);
 fPitch.textContent=FPitch.toFixed(1);

 cRoll.textContent=CRoll.toFixed(1);
 cYaw.textContent=CYaw.toFixed(1);
 cPitch.textContent=CPitch.toFixed(1);

 requestAnimationFrame(loop);
}
loop();

/* トリガー */
mainBtn.onclick=()=>{
 const BL=Number(bl.value);
 if(!sensorOK || !BL) return;

 const FPitch=Pitch+CPitch;
 const tanVal=Math.tan(FPitch*Math.PI/180);
 const T=BL*tanVal;

 lastT=T;

 formula.textContent =
 `${BL} × ${FPitch.toFixed(1)}°(${tanVal.toFixed(2)}) = ${T.toFixed(2)}`;

 const d=new Date();
 csv+=`${d.getMonth()+1}${d.getDate()},${d.toTimeString().slice(0,8)},${Roll},${Yaw},${Pitch},${CRoll},${CYaw},${CPitch},${FPitch},${BL},${T}\n`;
};

/* CSV */
csvBtn.onclick=()=>{
 const blob=new Blob([csv]);
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="log.csv";
 a.click();
};

/* キャリブレーション */
calBtn.onclick=()=>{
 CRoll=Roll;
 CYaw=Yaw;
 CPitch=Pitch;
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS v0.3.1</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#f5f5f5;
 color:#333;
}

/* モーダル（最前面） */
#modal{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,.6);
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:9999;
}
.modalBox{
 background:#fff;
 padding:20px;
 border-radius:10px;
 width:80%;
}

/* タイトル */
header{padding:10px;font-size:20px}

/* タブ */
.tabs{display:flex;border-bottom:1px solid #ccc}
.tab{padding:8px 14px;cursor:pointer}
.tab.active{
 border-bottom:2px solid #007bff;
 font-weight:bold;
}

/* スペース */
.topSpacer{height:10px}

/* カメラ */
#cameraArea{
 width:90vw;height:90vw;
 margin:auto;
 background:#ddd;
 border-radius:10px;
 overflow:hidden;
 position:relative;
 z-index:1; /* モーダルより下 */
}
video{
 width:100%;
 height:100%;
 object-fit:cover;
}

/* No Signal */
#nosignal{
 position:absolute;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 color:#666;
}

/* HUD */
#hud{
 position:absolute;
 right:10px;
 bottom:10px;
 font-size:14px;
 background:rgba(255,255,255,0.6);
 padding:5px;
 border-radius:6px;
}

/* ボタン */
.controls{
 display:flex;
 gap:10px;
 padding:10px;
}
.btn{
 flex:1;
 padding:10px;
 border-radius:8px;
 text-align:center;
}
.trigger{flex:2;font-weight:bold}

.red{background:#dc3545;color:#fff}
.green{background:#28a745;color:#fff}

/* 計算欄 */
#formula{
 margin:10px;
 padding:12px;
 background:#fff;
 border-radius:10px;
 font-size:16px;
}

/* 入力 */
input{
 padding:8px;
 border-radius:6px;
 border:1px solid #ccc;
 width:80px;
}

/* オプション */
#optionTab{display:none;padding:10px}

.card{
 background:#fff;
 padding:10px;
 border-radius:10px;
 margin-top:10px;
}
.optBtn{
 background:#fff;
 border:1px solid #ccc;
 padding:10px;
 margin-top:10px;
 border-radius:8px;
 text-align:center;
}
</style>
</head>

<body>

<!-- モーダル -->
<div id="modal">
 <div class="modalBox">
  <h3>READMEの確認</h3>
  <p>READMEをご確認ください。</p>
  <button onclick="start()">OK</button>
  <button onclick="location.href='https://www.mod.go.jp/atla/'">キャンセル</button>
 </div>
</div>

<header>ARIS</header>

<div class="tabs">
 <div id="tabMain" class="tab active" onclick="tab('main')">メイン</div>
 <div id="tabOpt" class="tab" onclick="tab('opt')">オプション</div>
</div>

<div class="topSpacer"></div>

<!-- メイン -->
<div id="mainTab">

<div id="cameraArea">
 <video id="video" autoplay playsinline></video>
 <div id="nosignal">No Signal</div>

 <div id="hud">
  Range:<span id="hBL">--</span><br>
  Alti:<span id="hAlt">--</span><br>
  MaxDev:<span id="hRal">--</span>
 </div>
</div>

<div class="controls">
 <div id="camBtn" class="btn red">カメラ</div>
 <div id="sensorBtn" class="btn red">センサ</div>
 <div id="mainBtn" class="btn trigger red">センサ許可</div>
</div>

<div id="formula">
 <input id="bl" placeholder="BL">
 × <span id="fpDisp">--</span>
 = <span id="tAlti">NaN</span>
</div>

</div>

<!-- オプション -->
<div id="optionTab">

<div class="card">
 AL = <input id="al" value="10">
</div>

<div class="card">
 AE = <input id="ae" value="1.0">
</div>

<div class="card">
 Roll:(<span id="fRoll"></span>)
 Yaw:(<span id="fYaw"></span>)
 Pitch:(<span id="fPitch"></span>)
</div>

<div class="card">
 CR:(<span id="cRoll"></span>)
 CY:(<span id="cYaw"></span>)
 CP:(<span id="cPitch"></span>)
</div>

<div class="optBtn" id="calBtn">キャリブレーション</div>

</div>

<script>
let Roll=0,Yaw=0,Pitch=0;
let CRoll=0,CYaw=0,CPitch=0;
let sensorOK=false;

function start(){modal.style.display="none"}

function tab(t){
 mainTab.style.display=(t==="main")?"block":"none";
 optionTab.style.display=(t==="opt")?"block":"none";
 tabMain.classList.toggle("active",t==="main");
 tabOpt.classList.toggle("active",t==="opt");
}

/* カメラ */
camBtn.onclick=async()=>{
 const s=await navigator.mediaDevices.getUserMedia({
  video:{facingMode:"environment"}
 });
 video.srcObject=s;
 nosignal.style.display="none";
 camBtn.className="btn green";
};

/* センサ */
sensorBtn.onclick=async()=>{
 if(DeviceOrientationEvent.requestPermission){
  const r=await DeviceOrientationEvent.requestPermission();
  if(r!=="granted")return;
 }
 window.addEventListener("deviceorientation",e=>{
  Roll=e.gamma||0;
  Pitch=(e.beta||0)-90;
  Yaw=e.alpha||0;
 });
 sensorBtn.className="btn green";
 sensorOK=true;
};

/* ループ */
function loop(){
 const BL=Number(bl.value)||0;
 const AE=Number(ae.value)||0;
 const FPitch=Pitch+CPitch;

 const T=BL*Math.tan(FPitch*Math.PI/180);
 const RAL=((100*Math.tan((FPitch+AE)*Math.PI/180))/(100*Math.tan(FPitch*Math.PI/180))*100)-100;

 hBL.textContent=BL;
 hAlt.textContent=T.toFixed(1);
 hRal.textContent=RAL.toFixed(1);

 fpDisp.textContent=`${FPitch.toFixed(1)}°(${Math.tan(FPitch*Math.PI/180).toFixed(2)})`;

 fRoll.textContent=(Roll+CRoll).toFixed(1);
 fYaw.textContent=(Yaw+CYaw).toFixed(1);
 fPitch.textContent=FPitch.toFixed(1);

 requestAnimationFrame(loop);
}
loop();

/* トリガー */
mainBtn.onclick=()=>{
 if(!sensorOK || !bl.value)return;

 const BL=Number(bl.value);
 const FPitch=Pitch+CPitch;
 const T=BL*Math.tan(FPitch*Math.PI/180);

 tAlti.textContent=T.toFixed(2);
};

/* キャリブレーション */
calBtn.onclick=()=>{
 CRoll=Roll;
 CYaw=Yaw;
 CPitch=Pitch;
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS v0.1</title>

<style>
body{margin:0;background:#000;color:#0f0;font-family:sans-serif}

/* モーダル */
#modal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.9);
 display:flex;justify-content:center;align-items:center;
 z-index:999;
}
.modalBox{background:#111;padding:20px;border:1px solid #0f0}

/* タイトル */
header{padding:10px;font-size:20px}

/* タブ */
.tabs{display:flex;border-bottom:1px solid #0f0}
.tab{
 padding:10px;
 border:1px solid #0f0;
 cursor:pointer;
}
.tab.active{
 background:#020;
 font-weight:bold;
}

/* カメラ上余白 */
.topSpacer{
 height:10px;
}

/* カメラ */
#cameraArea{
 width:90vw;height:90vw;margin:auto;
 background:#111;border:1px solid #0f0;
 position:relative;
}
video{width:100%;height:100%;object-fit:cover}

#nosignal{
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
}

/* レティクル */
#reticle{
 position:absolute;top:50%;left:50%;
 width:60px;height:60px;
 transform:translate(-50%,-50%);
 display:none;
}
#reticle::before,#reticle::after{
 content:"";position:absolute;background:#0f0;
}
#reticle::before{width:100%;height:2px;top:50%}
#reticle::after{height:100%;width:2px;left:50%}

/* HUD */
#hud{
 position:absolute;
 right:10px;bottom:10px;
 font-size:14px;
}

/* ボタン */
.controls{
 display:flex;gap:10px;padding:10px;
}
.btn{
 flex:1;
 padding:12px;
 border:1px solid #0f0;
 text-align:center;
}
.trigger{flex:2;font-size:18px;padding:16px}

.red{background:#400;color:#faa;border-color:#f55}
.green{background:#040;color:#afa;border-color:#5f5}

/* 式 */
#formula{
 display:flex;
 align-items:center;
 gap:10px;
 padding:10px;
 border-top:1px solid #0f0;
}
#formula input{width:80px}

/* オプション */
#optionTab{display:none;padding:10px}

.inline{
 display:flex;
 align-items:center;
 gap:10px;
 margin-top:10px;
}
.inline span:first-child{width:30px}
.inline input{width:80px}

.optBtn{
 border:1px solid #0f0;
 padding:10px;
 margin-top:10px;
 text-align:center;
}
</style>
</head>

<body>

<!-- モーダル -->
<div id="modal">
 <div class="modalBox">
  <h3>READMEの確認</h3>
  <p>READMEをご確認ください。続行すると同意したものとみなされます。</p>
  <button onclick="start()">OK</button>
  <button onclick="location.href='https://www.mod.go.jp/atla/'">キャンセル</button>
 </div>
</div>

<header>ARIS</header>

<div class="tabs">
 <div id="tabMain" class="tab active" onclick="tab('main')">メイン</div>
 <div id="tabOpt" class="tab" onclick="tab('opt')">オプション</div>
</div>

<div class="topSpacer"></div>

<!-- メイン -->
<div id="mainTab">

<div id="cameraArea">
 <video id="video" autoplay playsinline></video>
 <div id="nosignal">No Signal</div>
 <div id="reticle"></div>
 <div id="hud">
  range:<span id="hBL">--</span><br>
  Alt:<span id="hAlt">--</span><br>
  MaxDev:<span id="hRal">--</span>
 </div>
</div>

<div class="controls">
 <div id="camBtn" class="btn red">カメラ</div>
 <div id="sensorBtn" class="btn red">センサ</div>
 <div id="mainBtn" class="btn trigger red">センサを許可してください</div>
</div>

<div id="formula">
 <input id="bl" placeholder="BL">
 <span>×</span>
 <span id="tanVal">--</span>
 <span>=</span>
 <span id="tAlti">--</span>
</div>

</div>

<!-- オプション -->
<div id="optionTab">

<div class="inline">
 <span>AL</span><span>=</span>
 <input id="al" value="10">
</div>

<div class="inline">
 <span>AE</span><span>=</span>
 <input id="ae" value="1.0">
</div>

<div class="inline">
 Roll:<span id="roll"></span>
 Yaw:<span id="yaw"></span>
 Pitch:<span id="pitch"></span>
</div>

<div class="inline">
 CR:<span id="cRoll"></span>
 CY:<span id="cYaw"></span>
 CP:<span id="cPitch"></span>
</div>

<div class="optBtn" id="csvBtn">CSVデータダウンロード</div>
<div class="optBtn" id="calBtn">キャリブレーション</div>
<div class="optBtn" onclick="window.open('https://www.mod.go.jp/atla/')">フィードバック</div>

</div>

<script>
let camOK=false,sensorOK=false;
let Roll=0,Yaw=0,Pitch=0;
let CRoll=0,CYaw=0,CPitch=0;
let csv="";

function start(){modal.style.display="none"}

function tab(t){
 mainTab.style.display=(t==="main")?"block":"none";
 optionTab.style.display=(t==="opt")?"block":"none";
 tabMain.classList.toggle("active",t==="main");
 tabOpt.classList.toggle("active",t==="opt");
}

/* カメラ */
camBtn.onclick=async()=>{
 const s=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=s;
 nosignal.style.display="none";
 reticle.style.display="block";
 camOK=true;
 camBtn.className="btn green";
};

/* センサ */
sensorBtn.onclick=async()=>{
 if(DeviceOrientationEvent.requestPermission){
  const r=await DeviceOrientationEvent.requestPermission();
  if(r!=="granted")return;
 }
 window.addEventListener("deviceorientation",e=>{
  Roll=e.gamma||0;
  Pitch=(e.beta||0)+90;
  Yaw=e.alpha||0;
 });
 sensorOK=true;
 sensorBtn.className="btn green";
};

/* 更新 */
setInterval(()=>{
 let active=false;
 let text="センサを許可してください";

 if(sensorOK){
  text="ベースラインを入力してください";
  if(bl.value){
   text="計測";
   active=true;
  }
 }

 mainBtn.textContent=text;
 mainBtn.className="btn trigger "+(active?"green":"red");

 const BL=Number(bl.value)||0;
 const AE=Number(ae.value)||0;
 const FPitch=Pitch+CPitch;

 const tanValNum=Math.tan(FPitch*Math.PI/180);
 const T=BL*tanValNum;
 const RAL=100*Math.tan((FPitch+AE)*Math.PI/180);

 tanVal.textContent=tanValNum.toFixed(2);
 tAlti.textContent=T.toFixed(2);

 hBL.textContent=BL;
 hAlt.textContent=T.toFixed(1);
 hRal.textContent=RAL.toFixed(1);

 /* 色連動 */
 if(RAL>Number(al.value)){
  hud.style.color="red";
  reticle.style.filter="hue-rotate(300deg)";
  formula.style.color="red";
 }else{
  hud.style.color="#0f0";
  reticle.style.filter="none";
  formula.style.color="#0f0";
 }
},200);

/* トリガー */
mainBtn.onclick=()=>{
 if(mainBtn.className.includes("red"))return;

 const d=new Date();
 const row=`${d.getMonth()+1}${d.getDate()},${d.toTimeString().slice(0,8)},${Roll},${Yaw},${Pitch},${CRoll},${CYaw},${CPitch},${Pitch+CPitch},${bl.value},${tAlti.textContent}\n`;
 csv+=row;
};

/* CSV */
csvBtn.onclick=()=>{
 const blob=new Blob([csv]);
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="log.csv";
 a.click();
};

/* キャリブレーション */
calBtn.onclick=()=>{
 CRoll=Roll;
 CYaw=Yaw;
 CPitch=Pitch;
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS-M</title>

<link rel="stylesheet" href="style.css">

<!-- ▼ Googleアナリティクスはここに挿入 ▼ -->
<!-- 例：
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXXXXX');
</script>
-->
<!-- ▲ ここまで ▲ -->

</head>

<body>

<div id="modal">
 <div class="modalBox">
  <h3>READMEの確認</h3>
  <p>
  ARIS-MのREADMEをご確認ください。<br>
  OKを押すと、その内容および免責事項に同意したものとみなされます
  </p>
  <button onclick="start()">OK</button>
  <button onclick="location.href='https://github.com/LGA56562/ARIS'">READMEリンク</button>
 </div>
</div>

<header style="padding:10px;font-size:20px;">ARIS-M</header>

<div class="tabs">
 <div id="tabMain" class="tab active" onclick="tab('main')">メイン</div>
 <div id="tabOpt" class="tab" onclick="tab('opt')">オプション</div>
</div>

<div style="height:10px"></div>

<div id="mainTab">

<div id="cameraArea">
 <video id="video" autoplay playsinline></video>
 <div id="nosignal">No Signal</div>
 <div id="reticle"></div>

 <div id="hud">
  Range:<span id="hBL">--</span><br>
  Alti:<span id="hAlt">--</span><br>
  MaxDev:<span id="hRal">--</span>
 </div>
</div>

<div class="controls">
 <div id="camBtn" class="btn red">カメラ</div>
 <div id="sensorBtn" class="btn red">センサ</div>
 <div id="mainBtn" class="btn trigger red">センサを許可してください</div>
</div>

<div id="formula">
 <input id="bl" placeholder="ベースライン（m）">
 × <span id="fpDisp">--</span>
 ＝ 
 </span>
 <span id="tAlti" style="font-size:24px; color:#ff3030; font-weight:bold;">
  NaN
 </span> m
</div>

</div>

<div id="optionTab">

<div class="card">AL = <input id="al" value="10"></div>
<div class="card">AE = <input id="ae" value="1.0"></div>

<div class="card">
 Roll:(<span id="fRoll"></span>)
 Yaw:(<span id="fYaw"></span>)
 Pitch:(<span id="fPitch"></span>)
</div>

<div class="card">
 CR:(<span id="cRoll"></span>)
 CY:(<span id="cYaw"></span>)
 CP:(<span id="cPitch"></span>)
</div>

<div class="optBtn" id="csvBtn">CSVデータダウンロード</div>
<div class="optBtn" id="calBtn">キャリブレーション</div>
<div class="optBtn" onclick="window.open('https://forms.gle/ybAPSM3uGGtnHgnt9')">フィードバックの送信</div>

</div>

<footer>
 ARIS-M v<span id="version"></span><br>
 作成者：LGA56562 with chatGPT
</footer>

<script src="app.js"></script>
</body>
</html>

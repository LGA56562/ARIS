<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIS v0.3.2</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}

#modal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.6);
 display:flex;justify-content:center;align-items:center;
 z-index:9999;
}
.modalBox{background:#fff;padding:20px;border-radius:10px;width:80%}

.tabs{display:flex;border-bottom:1px solid #ccc}
.tab{padding:8px 14px;cursor:pointer}
.tab.active{border-bottom:2px solid #007bff;font-weight:bold}

#cameraArea{
 width:90vw;height:90vw;margin:auto;
 background:#ddd;border-radius:10px;
 position:relative;overflow:hidden;
}
video{width:100%;height:100%;object-fit:cover}

#nosignal{
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
}

#reticle{
 position:absolute;top:50%;left:50%;
 width:60px;height:60px;
 transform:translate(-50%,-50%);
 display:none;
}
#reticle::before,#reticle::after{
 content:"";position:absolute;background:#00ff00;
}
#reticle::before{width:100%;height:2px;top:50%}
#reticle::after{height:100%;width:2px;left:50%}

#hud{
 position:absolute;right:10px;bottom:10px;
 background:rgba(255,255,255,.7);
 padding:6px;border-radius:6px;
}

.controls{display:flex;gap:10px;padding:10px}
.btn{flex:1;padding:10px;border-radius:8px;text-align:center}
.trigger{flex:2;font-weight:bold}
.red{background:#dc3545;color:#fff}
.green{background:#28a745;color:#fff}

#formula{
 margin:10px;padding:12px;
 background:#fff;border-radius:10px;
}

#optionTab{display:none;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px;margin-top:10px}
.optBtn{border:1px solid #ccc;padding:10px;margin-top:10px;border-radius:8px;text-align:center}

footer{
 text-align:center;
 padding:10px;
 font-size:12px;
 color:#666;
}
</style>
</head>

<body>

<div id="modal">
 <div class="modalBox">
  <h3>READMEの確認</h3>
  <p>
  READMEをご確認ください。<br>
  続行すると、その内容および免責事項に同意したものとみなされます
  </p>
  <button onclick="start()">OK</button>
  <button onclick="location.href='https://github.com/LGA56562/ARIS'">キャンセル</button>
 </div>
</div>

<header style="padding:10px;font-size:20px;">ARIS</header>

<div class="tabs">
 <div id="tabMain" class="tab active" onclick="tab('main')">メイン</div>
 <div id="tabOpt" class="tab" onclick="tab('opt')">オプション</div>
</div>

<div style="height:10px"></div>

<div id="mainTab">

<div id="cameraArea">
 <video id="video" autoplay playsinline></video>
 <div id="nosignal">No Signal</div>
 <div id="reticle"></div>

 <div id="hud">
  Range:<span id="hBL">--</span><br>
  Alti:<span id="hAlt">--</span><br>
  MaxDev:<span id="hRal">--</span>
 </div>
</div>

<div class="controls">
 <div id="camBtn" class="btn red">カメラ</div>
 <div id="sensorBtn" class="btn red">センサ</div>
 <div id="mainBtn" class="btn trigger red">センサを許可してください</div>
</div>

<div id="formula">
 <input id="bl" placeholder="ベースライン（m）">
 × <span id="fpDisp">--</span>
 = <span id="tAlti">NaN</span>
</div>

</div>

<div id="optionTab">

<div class="card">AL = <input id="al" value="10"></div>
<div class="card">AE = <input id="ae" value="1.0"></div>

<div class="card">
 Roll:(<span id="fRoll"></span>)
 Yaw:(<span id="fYaw"></span>)
 Pitch:(<span id="fPitch"></span>)
</div>

<div class="card">
 CR:(<span id="cRoll"></span>)
 CY:(<span id="cYaw"></span>)
 CP:(<span id="cPitch"></span>)
</div>

<div class="optBtn" id="csvBtn">CSVデータダウンロード</div>
<div class="optBtn" id="calBtn">キャリブレーション</div>
<div class="optBtn" onclick="window.open('https://forms.gle/ybAPSM3uGGtnHgnt9')">フィードバックの送信</div>

</div>

<footer>
 ARIS-HE/M（仮） v0.3.2<br>
 作成者：LGA56562
</footer>

<script>
let Roll=0,Yaw=0,Pitch=0;
let CRoll=0,CYaw=0,CPitch=0;
let sensorOK=false;

let csv="date,time,Roll,Yaw,Pitch,CRoll,CYaw,CPitch,FPitch,BL,TAlti\n";

function start(){modal.style.display="none"}

function tab(t){
 mainTab.style.display=(t==="main")?"block":"none";
 optionTab.style.display=(t==="opt")?"block":"none";
 tabMain.classList.toggle("active",t==="main");
 tabOpt.classList.toggle("active",t==="opt");
}

camBtn.onclick=async()=>{
 const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=s;
 nosignal.style.display="none";
 reticle.style.display="block";
 camBtn.className="btn green";
};

sensorBtn.onclick=async()=>{
 if(DeviceOrientationEvent.requestPermission){
  const r=await DeviceOrientationEvent.requestPermission();
  if(r!=="granted")return;
 }
 window.addEventListener("deviceorientation",e=>{
  Roll=e.gamma||0;
  Pitch=(e.beta||0)-90;
  Yaw=e.alpha||0;
 });
 sensorBtn.className="btn green";
 sensorOK=true;
};

function updateMainBtn(){
 if(!sensorOK){
  mainBtn.textContent="センサを許可してください";
  mainBtn.className="btn trigger red";
 }
 else if(!bl.value){
  mainBtn.textContent="ベースラインを入力してください";
  mainBtn.className="btn trigger red";
 }
 else{
  mainBtn.textContent="計測";
  mainBtn.className="btn trigger green";
 }
}

function loop(){
 const BL=Number(bl.value)||0;
 const AE=Number(ae.value)||0;
 const FPitch=Pitch+CPitch;

 const R_Alti = BL * Math.tan((FPitch * 3.14) / 180);
 const RAL = R_Alti - (BL * Math.tan(((FPitch + AE) * 3.14) / 180));

 hBL.textContent=BL;
 hAlt.textContent=R_Alti.toFixed(1);
 hRal.textContent=RAL.toFixed(1);

 fpDisp.textContent=`tan((${FPitch.toFixed(1)} * 3.14)/180)`;

 fRoll.textContent=(Roll+CRoll).toFixed(1);
 fYaw.textContent=(Yaw+CYaw).toFixed(1);
 fPitch.textContent=FPitch.toFixed(1);

 const ALv = Number(al.value)||0;
 const alert = Math.abs(RAL) > ALv;
 const color = alert ? "#ff3030" : "#00ff00";

 reticle.style.filter = `drop-shadow(0 0 4px ${color})`;
 hud.style.color = color;

 updateMainBtn();
 requestAnimationFrame(loop);
}
loop();

mainBtn.onclick=()=>{
 if(!sensorOK || !bl.value)return;

 const BL=Number(bl.value);
 const FPitch=Pitch+CPitch;
 const T=BL*Math.tan((FPitch*3.14)/180);

 tAlti.textContent=T.toFixed(2);

 const d=new Date();
 csv+=`${d.getMonth()+1}${d.getDate()},${d.toTimeString().slice(0,8)},${Roll},${Yaw},${Pitch},${CRoll},${CYaw},${CPitch},${FPitch},${BL},${T}\n`;
};

csvBtn.onclick=()=>{
 const blob=new Blob([csv]);
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="aris_m_log.csv";
 a.click();
};

calBtn.onclick=()=>{
 CRoll=Roll;
 CYaw=Yaw;
 CPitch=Pitch;
};
</script>

</body>
</html>
